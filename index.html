<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
    <section id="game-area">
        <div id="controls">
            <span>
                <button onclick="startEasy()">Easy</button>
                <button onclick="startMedium()">Medium</button>
                <button onclick="startHard()">Hard</button>
            </span>
            <span>
                <span id="timer">000</span>⏱️
            </span>
            <span>
                <span id="flag-count">10</span> 🚩
            </span>
        </div>

        <div id="gameboard">
            <div id="gameoverlay"></div>
        </div>
    </section>
    <aside id="stats">
        <h2 id="sidebar-heading" onclick="sidebarClick(event)">+</h2>
        <p class="hidden">Games played: <span id="play-count-stat">0</span></p>
        <p class="hidden">Games won: <span id="win-stat">0</span></p>
        <p class="hidden">Best time: <span id="time-stat">---</span></p>
    </aside>
    </main>
    <script src="script.js"></script>
</body>

</html>
